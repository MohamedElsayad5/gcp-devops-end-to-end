apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: backend-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      # 1. Node Affinity
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - application
        # 2. Pod Anti-Affinity
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - backend-api
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: backend-api
          # the image for the backend API container
          image: us-central1-docker.pkg.dev/your-gcp-project-id/my-registry/backend-api:latest
          ports:
            - containerPort: 5000
          env:
            # the database service name for the backend to connect to
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "mysecurepassword"
            - name: DB_NAME
              value: "mydb"
            # the Redis service name for the backend to connect to
            - name: REDIS_HOST
              value: "redis-service"