apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  type: NodePort  
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
        - name: frontend-web
          image: us-central1-docker.pkg.dev/gcp-devops-ecommerce/my-registry/frontend-web:latest
          ports:
            - containerPort: 80